name: CI/CD Pipeline to AWS

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]

permissions:
  contents: read

jobs:
  build-and-test:
    name: Build & Test
    runs-on: ubuntu-latest

    steps:
    - name: Checkout Code
      uses: actions/checkout@v4

    - name: Set up JDK 17
      uses: actions/setup-java@v4
      with:
        java-version: '17'
        distribution: 'temurin'
        cache: maven

    - name: Build and Test with Maven
      run: mvn clean test

    - name: Cache Maven packages
      uses: actions/cache@v4
      with:
        path: ~/.m2
        key: ${{ runner.os }}-m2-${{ hashFiles('**/pom.xml') }}
        restore-keys: ${{ runner.os }}-m2



  deploy-to-aws:
    name: Deploy Container to AWS EC2
    needs: build-and-test
    runs-on: ubuntu-latest
    if: github.ref == 'refs/heads/main'

    steps:
    - name: Checkout Code
      uses: actions/checkout@v4

    - name: Build Docker image
      run: |
        docker build -t payment-action:latest .

    - name: Save Docker image as Tarball
      run: |
        docker save payment-action:latest | gzip > image.tar.gz

    - name: Copy Tarball to EC2 via SCP
      uses: appleboy/scp-action@v0.1.7
      with:
        host: ${{ secrets.EC2_HOST }}
        username: ${{ secrets.EC2_USERNAME }}
        key: ${{ secrets.EC2_SSH_KEY }}
        source: "image.tar.gz"
        target: "/home/${{ secrets.EC2_USERNAME }}/"

    - name: Load and Run Image on EC2 via SSH
      uses: appleboy/ssh-action@v1.0.3
      with:
        host: ${{ secrets.EC2_HOST }}
        username: ${{ secrets.EC2_USERNAME }}
        key: ${{ secrets.EC2_SSH_KEY }}
        script: |
          docker load -i /home/${{ secrets.EC2_USERNAME }}/image.tar.gz
          docker stop payment-action || true
          docker rm payment-action || true
          docker run -d --name payment-action -p 8080:8080 payment-action:latest
          rm /home/${{ secrets.EC2_USERNAME }}/image.tar.gz




